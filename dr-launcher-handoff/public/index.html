<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280" />
  <title>DR Launcher</title>
  <link rel="icon" href="/static/ds/favicon-d.svg" />
  <link rel="stylesheet" href="/static/ds/fonts.css" />
  <link rel="stylesheet" href="/static/ds/colors_and_type.css" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<div class="app">
  <!-- ── Topbar (full width) ──────────────────────────────────────── -->
  <header class="topbar">
    <div class="topbar__brand">
      <span class="brand-wordmark">datarails</span>
      <span class="brand-tag">Launcher</span>
    </div>

    <button class="ws-switcher" type="button">
      <span class="ws-switcher__avatar">JK</span>
      <span class="ws-switcher__name">Jamie Kruger</span>
      <span class="ws-switcher__caret">▾</span>
    </button>

    <div class="topbar__search" role="search">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input type="text" placeholder="Search customers, org IDs, hosts…" />
      <kbd>⌘K</kbd>
    </div>

    <div class="topbar__icons">
      <button class="top-ico" id="btn-refresh" title="Refresh">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3.06-6.78L21 8"/><path d="M21 3v5h-5"/></svg>
      </button>
      <button class="top-ico" id="btn-settings" title="Settings">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 0 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 0 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3h.1a1.7 1.7 0 0 0 1-1.5V3a2 2 0 0 1 4 0v.1A1.7 1.7 0 0 0 15 4.6a1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8v.1a1.7 1.7 0 0 0 1.5 1H21a2 2 0 0 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1Z"/></svg>
      </button>
    </div>

    <div class="topbar__avatar">JK</div>
  </header>

  <!-- ── Icon rail ────────────────────────────────────────────────── -->
  <aside class="rail">
    <button class="rail__item is-active" title="Home">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </button>
    <button class="rail__item" title="Recently launched">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
    </button>
    <button class="rail__item" title="Activity">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 3 14h9l-1 8 10-12h-9l1-8Z"/></svg>
    </button>
  </aside>

  <!-- ── Secondary sidebar ───────────────────────────────────────── -->
  <nav class="sidebar" id="sidebar">
    <!-- Populated by JS — see app.js#renderSidebar. -->
  </nav>

  <!-- ── Main ────────────────────────────────────────────────────── -->
  <main class="main" id="main-content">
    <div class="loading">
      <div class="spinner"></div>
      <div>Discovering authenticated customers…</div>
    </div>
  </main>
</div>

<!-- Toast tray -->
<div class="toast-tray" id="toasts"></div>

<script>
  // Server injects the API token here.
  window.__DR_TOKEN__ = "__API_TOKEN__";
</script>
<script src="/static/app.js"></script>
</body>
</html>
