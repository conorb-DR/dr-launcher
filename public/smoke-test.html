<!DOCTYPE html>
<!--
  Smoke test for the vanilla port. Mocks the `/api/*` endpoints with
  realistic data so the launcher's index.html + style.css + app.js can be
  inspected in the browser without running the Node server.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280" />
  <title>DR Launcher · smoke test</title>
  <link rel="icon" href="ds/favicon-d.svg" />
  <link rel="stylesheet" href="ds/fonts.css" />
  <link rel="stylesheet" href="ds/colors_and_type.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">
  <header class="topbar">
    <div class="topbar__brand">
      <span class="brand-wordmark">datarails</span>
      <span class="brand-tag">Launcher</span>
    </div>
    <button class="ws-switcher" type="button">
      <span class="ws-switcher__avatar">JK</span>
      <span class="ws-switcher__name">Jamie Kruger</span>
      <span class="ws-switcher__caret">▾</span>
    </button>
    <div class="topbar__search" role="search">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input type="text" placeholder="Search customers, org IDs, hosts…" />
      <kbd>⌘K</kbd>
    </div>
    <div class="topbar__icons">
      <button class="top-ico" id="btn-theme" title="Toggle dark mode"></button>
      <button class="top-ico" id="btn-refresh" title="Refresh">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3.06-6.78L21 8"/><path d="M21 3v5h-5"/></svg>
      </button>
      <button class="top-ico" id="btn-help" title="Help">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      </button>
      <button class="top-ico" id="btn-settings" title="Settings">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 0 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 0 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3h.1a1.7 1.7 0 0 0 1-1.5V3a2 2 0 0 1 4 0v.1A1.7 1.7 0 0 0 15 4.6a1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8v.1a1.7 1.7 0 0 0 1.5 1H21a2 2 0 0 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1Z"/></svg>
      </button>
    </div>
    <div class="topbar__avatar">JK</div>
  </header>

  <aside class="rail">
  </aside>

  <nav class="sidebar" id="sidebar"></nav>

  <main class="main" id="main-content">
    <div class="loading">
      <div class="spinner"></div>
      <div>Discovering authenticated customers…</div>
    </div>
  </main>
</div>

<div class="toast-tray" id="toasts"></div>

<script>
  // Mock API: intercept fetch and reply with realistic data, so app.js
  // works untouched outside the real server.
  window.__DR_TOKEN__ = "smoke-test-token";

  const MOCK_ACCOUNTS = [
    { id: "1", orgDomain: "acme-corp.com",           email: "patty.cho@acme-corp.com",          serverKey: "US",  serverHost: "app.datarails.com",    orgId: "104221", userId: 88412, cliAuthStatus: "active",  lastUsed: "2 hours ago"  },
    { id: "2", orgDomain: "nordwind-finance.com",    email: "j.kruger@nordwind-finance.com",    serverKey: "UK",  serverHost: "ukapp.datarails.com",  orgId: "204015", userId: 12044, cliAuthStatus: "active",  lastUsed: "Yesterday"    },
    { id: "3", orgDomain: "arcadia-labs.io",         email: "ravi@arcadia-labs.io",             serverKey: "US",  serverHost: "app.datarails.com",    orgId: "104998", userId: 90112, cliAuthStatus: "active",  lastUsed: "Today, 09:14" },
    { id: "4", orgDomain: "meridian-capital.com",    email: "ops@meridian-capital.com",         serverKey: "US2", serverHost: "us-2.datarails.com",   orgId: "312088", userId: 33012, cliAuthStatus: "expired", lastUsed: "8 days ago"   },
    { id: "5", orgDomain: "hokkaido-foods.jp",       email: "t.sato@hokkaido-foods.jp",         serverKey: "CA",  serverHost: "caapp.datarails.com",  orgId: "411023", userId: 27812, cliAuthStatus: "active",  lastUsed: "3 days ago"   },
    { id: "6", orgDomain: "bluegrass-tech.com",      email: "morgan.lee@bluegrass-tech.com",    serverKey: "US",  serverHost: "app.datarails.com",    orgId: "105511", userId: 91223, cliAuthStatus: "active",  lastUsed: "11 min ago"   },
    { id: "7", orgDomain: "tristate-energy.com",     email: "kim@tristate-energy.com",          serverKey: "US2", serverHost: "us-2.datarails.com",   orgId: "312500", userId: 33908, cliAuthStatus: "active",  lastUsed: "Today, 08:02" },
    { id: "8", orgDomain: "finchley-partners.co.uk", email: "h.dale@finchley-partners.co.uk",   serverKey: "UK",  serverHost: "ukapp.datarails.com",  orgId: "204801", userId: 12880, cliAuthStatus: "expired", lastUsed: "26 days ago"  }
  ];

  const realFetch = window.fetch.bind(window);
  window.fetch = async (url, opts) => {
    const u = typeof url === "string" ? url : url.url;
    const reply = (data, status = 200) => new Response(JSON.stringify(data), { status, headers: { "Content-Type": "application/json" } });

    if (u === "/ping")                   return reply({ ok: true, port: 3456, pid: 9999, version: "1.0.0", packaged: false });
    if (u.startsWith("/api/accounts"))  return reply({ accounts: MOCK_ACCOUNTS });
    if (u.startsWith("/api/settings"))  return reply({ useVirtualDesktops: true });
    if (u.startsWith("/api/health"))    return reply({ status: "ok", checks: { dr: { found: true }, chrome: { found: true, path: "C:\\Program Files\\Google\\Chrome\\Application\\chrome.exe" }, claude: { found: true }, windowsTerminal: { found: true }, workspaceRoot: { path: "C:\\Users\\Demo\\Documents\\DR-Customers", writable: true }, virtualDesktop: { available: true, supportsNaming: true } }, servers: ["US","US2","UK","CA"] });
    if (u.startsWith("/api/servers"))   return reply({ servers: [
      { key: "US",  host: "https://app.datarails.com",  label: "app.datarails.com",  region: "United States", color: "#4646CE", soft: "#DFD9FF", text: "#25258C" },
      { key: "US2", host: "https://us-2.datarails.com", label: "us-2.datarails.com", region: "United States (instance 2)", color: "#7B61FF", soft: "#F0EEFF", text: "#5D45D6" },
      { key: "UK",  host: "https://ukapp.datarails.com", label: "ukapp.datarails.com", region: "United Kingdom", color: "#03A678", soft: "#ECFAE4", text: "#037C5A" },
      { key: "CA",  host: "https://caapp.datarails.com", label: "caapp.datarails.com", region: "Canada", color: "#FFA310", soft: "#FFF4D4", text: "#9E5F00" }
    ]});
    if (u.startsWith("/api/sessions/health")) return reply({ checked: 2, alive: ["s1"], stale: [], dead: [], recovered: [] });
    if (u.startsWith("/api/sessions/close") || u.startsWith("/api/sessions/force-close")) return reply({ ok: true, steps: { terminal: { ok: true }, chrome: { ok: true }, desktop: { ok: true, skipped: true } } });
    if (u.startsWith("/api/sessions"))  return reply([
      { sessionId: "s1", accountId: "6", orgDomain: "bluegrass-tech.com", serverKey: "US", status: "active", launchedAt: new Date(Date.now() - 3600000).toISOString() },
      { sessionId: "s2", accountId: "3", orgDomain: "arcadia-labs.io",    serverKey: "US", status: "stale",  launchedAt: new Date(Date.now() - 7200000).toISOString(), staleAt: new Date(Date.now() - 300000).toISOString() }
    ]);
    if (u.startsWith("/api/recents"))   return reply({ recents: [] });
    if (u.startsWith("/api/auth/status")) return reply({ authenticated: true, provider: "dev", user: { id: "dev-jk", name: "Jamie Kruger", email: "j.kruger@datarails.com" } });
    if (u.startsWith("/api/sync/init")) return reply({ ok: true });
    if (u.startsWith("/api/sync/status")) return reply({ enabled: false });
    if (u.startsWith("/api/logs"))      return reply({ entries: [
      { ts: new Date().toISOString(), level: "info", category: "server", message: "DR Launcher running at http://127.0.0.1:3456" },
      { ts: new Date().toISOString(), level: "info", category: "http", message: "GET /api/accounts 200", meta: { ms: 1200 } }
    ]});
    if (u.startsWith("/api/diagnostics")) return reply({ text: "DR Launcher Diagnostics\n========================\nOS: Windows 11\nNode: v20.0.0\nServers: US, US2, UK, CA\nWorkspace root: C:\\Users\\Demo\\Documents\\DR-Customers (writable: true)\n\nRecent log entries:\n[INFO] [server] DR Launcher running at http://127.0.0.1:3456\n[INFO] [http] GET /api/accounts 200 (1200ms)" });
    if (u.startsWith("/api/cli/version"))  return reply({ installed: true, version: "0.2.50" });
    if (u.startsWith("/api/cleanup/scan")) return reply({ profiles: [
      { path: "C:\\Users\\Demo\\AppData\\Local\\DR Launcher\\ChromeProfiles\\us-99999-old-customer-com", slug: "us-99999-old-customer-com", sizeMB: 42.3, lastUsed: "2025-12-01T00:00:00Z" }
    ], workspaces: [
      { path: "C:\\Users\\Demo\\Documents\\DR-Customers\\us-99999-old-customer-com", slug: "us-99999-old-customer-com", sizeMB: 1.2, lastUsed: "2025-12-01T00:00:00Z", hasUserContent: true }
    ]});
    if (u.startsWith("/api/cleanup/purge")) return reply({ ok: true, profiles: { deleted: [], errors: [] }, workspaces: { quarantined: [], errors: [] } });
    if (u.startsWith("/api/open-folder")) return reply({ ok: true });
    if (u.startsWith("/api/launch"))    return reply({
      chrome: { ok: true, pid: 2103 },
      terminal: { ok: true, pid: 8821 },
      workspace: { ok: true, path: "C:\\Users\\Demo\\Documents\\DR-Customers\\us-105511-bluegrass-tech-com", claudeMdCreated: false, claudeMdUpdated: true },
      virtualDesktop: { enabled: true, ok: true, switched: true, desktopName: "[US] bluegrass-tech.com", reused: false }
    });
    if (u.startsWith("/api/login"))     return reply({ started: true });
    return realFetch(url, opts);
  };
</script>
<script src="app.js"></script>

</body>
</html>
