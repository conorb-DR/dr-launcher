<!DOCTYPE html>
<html lang="en" data-theme="__THEME__">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280" />
  <title>DR Launcher</title>
  <link rel="icon" href="/static/ds/favicon-d.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/ds/fonts.css" />
  <link rel="stylesheet" href="/static/ds/colors_and_type.css" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<!-- Login gate (shown when not authenticated) -->
<div class="login-screen" id="login-screen">
  <div class="login-card">
    <div class="login-brand">
      <span class="brand-wordmark">datarails</span>
      <span class="brand-tag">Launcher</span>
    </div>

    <div id="login-microsoft" style="display:none">
      <h1 class="login-title">Sign in to get started</h1>
      <p class="login-subtitle">Use your Datarails Microsoft account to continue.</p>
      <button class="btn btn--primary login-btn" id="login-btn">
        <svg class="ic" width="20" height="20" viewBox="0 0 21 21" fill="none"><rect x="1" y="1" width="9" height="9" fill="#F25022"/><rect x="11" y="1" width="9" height="9" fill="#7FBA00"/><rect x="1" y="11" width="9" height="9" fill="#00A4EF"/><rect x="11" y="11" width="9" height="9" fill="#FFB900"/></svg>
        Sign in with Microsoft
      </button>
    </div>

    <div id="login-dev" style="display:none">
      <h1 class="login-title">Developer Login</h1>
      <p class="login-subtitle">Azure AD not configured. Enter the dev password to continue.</p>
      <div class="login-fields">
        <input type="text" id="dev-name" class="login-input" placeholder="Your name (optional)" autocomplete="off" />
        <input type="password" id="dev-password" class="login-input" placeholder="Password" autocomplete="off" />
      </div>
      <button class="btn btn--primary login-btn" id="dev-login-btn">Sign in</button>
    </div>

    <div class="login-status" id="login-status"></div>
  </div>
</div>

<!-- Studio app shell -->
<div class="studio" id="app-shell" style="display:none">

  <!-- Topbar -->
  <header class="studio__topbar" id="topbar">
    <!-- Populated by JS — renderTopbar() -->
  </header>

  <!-- Body: sidebar + main -->
  <div class="studio__body">
    <aside class="studio__sidebar" id="sidebar">
      <!-- Populated by JS — renderSidebar() -->
    </aside>
    <main class="studio__main" id="main-content">
      <div class="st-loading">
        <div class="spinner"></div>
        <div>Discovering authenticated customers...</div>
      </div>
    </main>
  </div>

  <!-- Persistent launch strip -->
  <footer class="studio__strip" id="launch-strip">
    <!-- Populated by JS — renderLaunchStrip() -->
  </footer>

</div>

<!-- Toast tray -->
<div class="toast-tray" id="toasts"></div>

<script src="/static/app.js"></script>
</body>
</html>
